<article class="article-card">
  <a href="{{ post.url | relative_url }}">
    <div class="card-image">
      {% if post.image %}
      <img src="{{ post.image | relative_url }}" alt="{{ post.title }}" loading="lazy">
      {% else %}
      <div style="width:100%;height:100%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;">
        <span style="font-family:var(--font-head);font-size:1.5rem;font-weight:800;color:var(--text-dim);letter-spacing:0.1em">PATRIA</span>
      </div>
      {% endif %}
    </div>
    <div class="card-body">
      <div class="card-meta">
        {% if post.category %}<span class="cat-badge cat-{{ post.category }}">{{ post.category | replace: '-', ' ' | upcase }}</span>{% endif %}
        <span class="date-stamp">{{ post.date | date: "%b %-d" }}</span>
      </div>
      <h2 class="card-title">{{ post.title }}</h2>
      {% if post.excerpt %}<p class="card-excerpt">{{ post.excerpt | strip_html | truncate: 120 }}</p>{% endif %}
    </div>
  </a>
</article>
